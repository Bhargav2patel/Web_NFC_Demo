<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Web NFC Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f4f6f8;
            text-align: center;
        }

        h2 {
            margin-bottom: 10px;
        }

        .box {
            background: #fff;
            padding: 16px;
            border-radius: 8px;
            margin-top: 20px;
        }

        button {
            margin-top: 25px;
            padding: 14px 22px;
            font-size: 18px;
            cursor: pointer;
        }

        .status {
            margin-top: 15px;
            font-weight: bold;
        }

        .error {
            color: red;
        }

        .success {
            color: green;
        }
    </style>
</head>

<body>

    <h2 id="title">Loading...</h2>

    <div class="box" id="instruction"></div>

    <button id="actionButton" onclick="startNFC()">SEND VIA NFC</button>

    <div class="status" id="status">Idle</div>

    <script>
        let actionValue = null;

        function getValueFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get("value");
        }

        function setupUI(value) {
            const title = document.getElementById("title");
            const instruction = document.getElementById("instruction");
            const button = document.getElementById("actionButton");
            const status = document.getElementById("status");

            // 🔓 UNLOCK MODE
            if (value === "2") {
                actionValue = "2";
                title.innerText = "🔓 NFC UNLOCK MODE";
                instruction.innerHTML = `
                    <p>This page is in <strong>UNLOCK</strong> mode.</p>
                    <p>Click below and tap NFC device.</p>
                    <br>
                    <button onclick="switchToRead()">📖 READ NFC</button>
                `;
                button.innerText = "UNLOCK VIA NFC";
                status.innerText = "Ready to unlock";
            }

            // 🔒 LOCK MODE
            else if (value === "3") {
                actionValue = "3";
                title.innerText = "🔒 NFC LOCK MODE";
                instruction.innerHTML = `
                    <p>This page is in <strong>LOCK</strong> mode.</p>
                    <p>Click below and tap NFC device.</p>
                    <br>
                    <button onclick="switchToRead()">📖 READ NFC</button>
                `;
                button.innerText = "LOCK VIA NFC";
                status.innerText = "Ready to lock";
            }

            // 📖 DEFAULT → READ MODE
            else {
                renderReadUI();
            }
        }

        function renderReadUI() {
            const title = document.getElementById("title");
            const instruction = document.getElementById("instruction");
            const button = document.getElementById("actionButton");

            actionValue = null;

            title.innerText = "📖 NFC READ MODE";

            instruction.innerHTML = `
                <p>Click below and tap NFC tag to read data.</p>
                <textarea id="nfcData" rows="4" style="width:100%;margin-top:15px;" disabled placeholder="Scanned data will appear here..."></textarea>
                <br><br>
                <a href="?value=2">🔓 Unlock Mode</a> | 
                <a href="?value=3">🔒 Lock Mode</a>
            `;

            button.innerText = "READ NFC";
            button.onclick = startRead;
        }

        function switchToRead() {
            renderReadUI();
        }

        async function startNFC() {
            suggestsRetry();

            if (!actionValue) return;

            if (!("NDEFReader" in window)) {
                showError("NFC not supported");
                return;
            }

            try {
                const ndef = new NDEFReader();
                await ndef.write(actionValue);
                showSuccess("Data sent successfully");
            } catch (err) {
                console.error(err);
                showError("Write failed");
            }
        }

        async function startRead() {
            suggestsRetry();

            if (!("NDEFReader" in window)) {
                showError("NFC not supported");
                return;
            }

            try {
                const ndef = new NDEFReader();

                await ndef.scan();

                ndef.onreading = (event) => {
                    let text = "";

                    for (const record of event.message.records) {
                        if (record.recordType === "text") {
                            const decoder = new TextDecoder(record.encoding);
                            text += decoder.decode(record.data);
                        }
                    }

                    document.getElementById("nfcData").value = text || "No text data found";
                    showSuccess("Data read successfully");
                };

            } catch (err) {
                console.error(err);
                showError("Read failed");
            }
        }

        function showError(msg) {
            const status = document.getElementById("status");
            status.className = "status error";
            status.innerText = "❌ " + msg;
        }

        function showSuccess(msg) {
            const status = document.getElementById("status");
            status.className = "status success";
            status.innerText = "✅ " + msg;
        }

        function suggestsRetry() {
            const status = document.getElementById("status");
            status.className = "status";
            status.innerText = "Tap NFC device now...";
        }

        setupUI(getValueFromURL());
    </script>

</body>

</html>
